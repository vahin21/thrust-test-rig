<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cygnus Launch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c12; --panel: #12151f; --border: #1e2436;
      --accent: #e84040; --green: #22c55e; --text: #e2e8f0; --muted: #64748b;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 24px; }

    /* LOGIN */
    #loginSection { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 48px 56px; width: 340px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    #loginSection h2 { font-size: 1.4rem; letter-spacing: 1px; }
    #loginSection p { color: var(--muted); font-size: 0.85rem; }
    #loginSection input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; outline: none; }
    #loginSection input:focus { border-color: var(--accent); }
    #loginBtn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    #loginBtn:hover { opacity: 0.85; }
    #loginError { color: var(--accent); font-size: 0.85rem; display: none; }

    /* DASHBOARD */
    #dashSection { display: none; flex-direction: column; align-items: center; gap: 32px; width: 100%; max-width: 420px; }
    h1 { font-size: 1.4rem; letter-spacing: 2px; color: var(--accent); }

    .fire-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 48px; display: flex; justify-content: center; }
    #fireBtn {
      width: 200px; height: 200px; border-radius: 50%;
      background: var(--accent); border: 3px solid var(--accent);
      color: white; font-size: 1.3rem; font-weight: 800; letter-spacing: 2px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 0 40px rgba(232,64,64,0.4);
      animation: pulse 2s infinite;
    }
    #fireBtn:hover { box-shadow: 0 0 70px rgba(232,64,64,0.7); }
    #fireBtn:active { transform: scale(0.95); }
    #fireBtn:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }
    @keyframes pulse { 0%,100%{ box-shadow: 0 0 40px rgba(232,64,64,0.4); } 50%{ box-shadow: 0 0 70px rgba(232,64,64,0.7); } }

    #status { font-size: 0.95rem; color: var(--muted); padding: 12px 24px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; width: 100%; text-align: center; }
    #status.ok  { color: var(--green);  border-color: var(--green); }
    #status.err { color: var(--accent); border-color: var(--accent); }

    .logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .logout:hover { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginSection">
  <div style="font-size:2.5rem">🚀</div>
  <h2>CYGNUS LAUNCH</h2>
  <p>Enter password to continue</p>
  <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
  <div id="loginError">⚠ Incorrect password</div>
  <button id="loginBtn" onclick="doLogin()">AUTHENTICATE</button>
</div>

<!-- DASHBOARD -->
<div id="dashSection">
  <h1>🚀 CYGNUS LAUNCH</h1>
  <div class="fire-wrap">
    <button id="fireBtn" onclick="fire()">FIRE</button>
  </div>
  <div id="status">Ready to fire</div>
  <button class="logout" onclick="logout()">⎋ Logout</button>
</div>

<script>
  function doLogin() {
    const pw = document.getElementById('pwInput').value;
    if (pw === 'Cygnus02') {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashSection').style.display = 'flex';
    } else {
      document.getElementById('loginError').style.display = '';
      document.getElementById('pwInput').value = '';
      setTimeout(() => document.getElementById('loginError').style.display = 'none', 3000);
    }
  }

  function logout() {
    document.getElementById('loginSection').style.display = 'flex';
    document.getElementById('dashSection').style.display = 'none';
    document.getElementById('pwInput').value = '';
  }

  async function fire() {
    const btn = document.getElementById('fireBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.className = '';
    status.textContent = 'Firing...';
    try {
      const res = await fetch('/api/launch', { method: 'POST' });
      const json = await res.json();
      if (res.ok) {
        status.className = 'ok';
        status.textContent = '✅ Relay fired!';
      } else {
        status.className = 'err';
        status.textContent = '⚠ ' + (json.error || 'Failed');
      }
    } catch (e) {
      status.className = 'err';
      status.textContent = '⚠ Network error';
    }
    setTimeout(() => {
      btn.disabled = false;
      status.className = '';
      status.textContent = 'Ready to fire';
    }, 4000);
  }
</script>
</body>
</html>
