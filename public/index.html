<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Launch</title>
  <style>
    body { background: #0a0c12; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
    button { padding: 20px 60px; font-size: 1.5rem; font-weight: bold; background: #e84040; color: white; border: none; border-radius: 12px; cursor: pointer; }
    button:hover { opacity: 0.85; }
    #status { font-size: 1rem; color: #64748b; }
  </style>
</head>
<body>
  <h1>🚀 CYGNUS LAUNCH</h1>
  <button onclick="fire()">FIRE RELAY</button>
  <div id="status">Ready</div>

  <script>
    async function fire() {
      document.getElementById('status').textContent = 'Firing...';
      try {
        const res = await fetch('/api/launch', { method: 'POST' });
        const json = await res.json();
        document.getElementById('status').textContent = '✅ ' + json.status;
      } catch(e) {
        document.getElementById('status').textContent = '⚠ Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
