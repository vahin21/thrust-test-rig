<!DOCTYPE html>
<html>
<head>
  <title>Static Thrust Test Rig Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#111;
      color:white;
    }

    input, button{
      padding:8px;
      margin:5px;
      font-size:16px;
    }

    button{
      cursor:pointer;
    }

    #dashboardSection{
      display:none;
    }

    #fireBtn{
      background:red;
      color:white;
      font-weight:bold;
    }

    canvas{
      background:white;
      border-radius:6px;
    }
  </style>
</head>

<body>

<h2>Static Thrust Test Rig</h2>

<!-- LOGIN -->
<div id="loginSection">

<h3>Login</h3>

<input type="password" id="password" placeholder="Password">
<button onclick="login()">Send OTP</button>

<br>

<input type="number" id="otp" placeholder="Enter OTP">
<button onclick="verify()">Verify</button>

</div>

<!-- DASHBOARD -->
<div id="dashboardSection">

<h3>Live Thrust</h3>
<p id="thrust">0</p>

<h3>Thrust vs Time</h3>
<canvas id="chart" width="800" height="400"></canvas>

<br>

<button id="fireBtn" onclick="fire()">FIRE MOTOR</button>
<button onclick="tare()">TARE</button>

<hr>

<h3>Calibration</h3>

<p>Place a known weight on the load cell</p>

<input type="number" id="knownWeight" placeholder="Enter known weight (g)">
<button onclick="calibrate()">Calibrate</button>

<p>Calibration Factor: <span id="calValue">-</span></p>

</div>


<script>

let verified = false;

/* ---------- GRAPH SETUP ---------- */

const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx,{
  type:"line",
  data:{
    labels:[],
    datasets:[{
      label:"Thrust",
      data:[],
      borderWidth:2,
      tension:0.3
    }]
  },
  options:{
    animation:false,
    scales:{
      x:{
        title:{
          display:true,
          text:"Time"
        }
      },
      y:{
        title:{
          display:true,
          text:"Thrust"
        }
      }
    }
  }
});

/* ---------- LOGIN ---------- */

async function login(){

  await fetch("/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      password:document.getElementById("password").value
    })
  });

}

/* ---------- VERIFY OTP ---------- */

async function verify(){

  const res = await fetch("/api/verify",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      otp:document.getElementById("otp").value
    })
  });

  if(res.ok){

    verified=true;

    document.getElementById("loginSection").style.display="none";
    document.getElementById("dashboardSection").style.display="block";

  }

}

/* ---------- CALIBRATION ---------- */

async function calibrate(){

  if(!verified){
    alert("Login required");
    return;
  }

  const weight = document.getElementById("knownWeight").value;

  await fetch("/api/calibrate",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ weight })
  });

}

/* ---------- TARE ---------- */

async function tare(){

  if(!verified){
    alert("Login required");
    return;
  }

  await fetch("/api/tare");

}

/* ---------- FIRE ---------- */

async function fire(){

  if(!verified){
    alert("Login required");
    return;
  }

  await fetch("/api/fire");

}

/* ---------- DATA LOOP ---------- */

setInterval(async()=>{

  const res = await fetch("/api/data");
  const json = await res.json();

  document.getElementById("thrust").innerText = json.thrust;

  document.getElementById("calValue").innerText = json.calibration;

  if(verified && json.thrust !== undefined){
    document.getElementById("fireBtn").disabled=false;
  }

  const time = new Date().toLocaleTimeString();

  chart.data.labels.push(time);
  chart.data.datasets[0].data.push(json.thrust);

  if(chart.data.labels.length>50){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();

},1000);

</script>

</body>
</html>
